services:
  nginx:
    ports:
      - "8080:80"
    volumes:
      - ./nginx/test/conf.d:/etc/nginx/conf.d:ro

  mongodb:
    image: ${MONGODB_IMAGE:-mongo:4.4}

  backend:
    environment:
      REZEPTE_TEST: "1"
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started

  keycloak:
    command:
      - start-dev
      - --http-enabled=true
      - --http-relative-path=/auth
      - --proxy-headers=xforwarded
      - --hostname=${APP_BASE_URL}/auth

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
    ports:
      - "9101:9001"
    networks:
      - rezepte

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    env_file:
      - ${REZEPTE_ENV_FILE}
      - ${REZEPTE_SECRETS_FILE}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/$${S3_BUCKET};
      mc anonymous set none local/$${S3_BUCKET};
      echo 'MinIO bucket ready.';
      "
    networks:
      - rezepte

volumes:
  minio_data:
