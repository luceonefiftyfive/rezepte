server {
    listen 80;
    server_name rezepte.unbenet.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;

    server_name rezepte.unbenet.de;

    ssl_certificate /etc/letsencrypt/live/rezepte.unbenet.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rezepte.unbenet.de/privkey.pem;

    client_max_body_size 25M;

    resolver 127.0.0.11 ipv6=off valid=10s;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    location = /api {
        return 308 /api/;
    }

    location /api/ {
        set $backend_upstream backend:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend_upstream;
    }

    location = /auth {
        return 308 /auth/;
    }

    location /auth/ {
        set $keycloak_upstream keycloak:8080;
        proxy_pass http://$keycloak_upstream;

        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Prefix /auth;
    }

    location / {
        set $frontend_upstream frontend:80;
        proxy_pass http://$frontend_upstream;
    }
}
